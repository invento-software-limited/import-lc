name: CI Tests

on:
  push:
    branches:
      - version-16
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: python3.12
    
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      redis-socketio:
        image: redis:alpine
        ports:
          - 12000:6379

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup MariaDB Client
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Setup Bench
        run: |
          python3 -m pip install frappe-bench
          bench() { python3 -c "from bench.cli import cli; cli()" "$@"; }
          bench init --skip-redis-config-generation --python python3 --skip-assets --no-backups ~/frappe-bench
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install Apps
        working-directory: /home/runner/frappe-bench
        run: |
          bench() { python3 -c "from bench.cli import cli; cli()" "$@"; }
          bench get-app frappe --branch version-16
          bench get-app erpnext --branch version-16
          bench get-app import_lc $GITHUB_WORKSPACE
          bench new-site --db-root-password root --admin-password admin --db-host 127.0.0.1 test_site
          bench --site test_site install-app erpnext
          bench --site test_site install-app import_lc
        env:
          CI: 'Yes'

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench() { python3 -c "from bench.cli import cli; cli()" "$@"; }
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app import_lc
        env:
          TYPE: server