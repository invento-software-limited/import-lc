<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="18" ry="18" fill="#1B3A6B"/>
  
  <!-- Globe (left background) -->
  <circle cx="35" cy="55" r="22" fill="none" stroke="#C9A84C" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="35" cy="55" rx="10" ry="22" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.8"/>
  <line x1="13" y1="55" x2="57" y2="55" stroke="#C9A84C" stroke-width="2" opacity="0.8"/>
  <line x1="13" y1="45" x2="57" y2="45" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
  <line x1="13" y1="65" x2="57" y2="65" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Document (front, center-right) -->
  <rect x="42" y="18" width="38" height="48" rx="4" ry="4" fill="#FFFFFF"/>
  <!-- Folded corner -->
  <polygon points="70,18 80,28 70,28" fill="#B0C8E8"/>
  <line x1="70" y1="18" x2="70" y2="28" stroke="#1B3A6B" stroke-width="0.5"/>
  <line x1="70" y1="28" x2="80" y2="28" stroke="#1B3A6B" stroke-width="0.5"/>
  <!-- Document lines -->
  <rect x="48" y="32" width="20" height="3" rx="1" fill="#C9A84C"/>
  <rect x="48" y="40" width="24" height="2.5" rx="1" fill="#B0C8E8"/>
  <rect x="48" y="47" width="22" height="2.5" rx="1" fill="#B0C8E8"/>
  <rect x="48" y="54" width="18" height="2.5" rx="1" fill="#B0C8E8"/>
  
  <!-- Ship bottom -->
  <path d="M18 76 Q50 72 82 76 L78 84 Q50 88 22 84 Z" fill="#C9A84C"/>
  <!-- Ship hull detail -->
  <path d="M22 84 Q50 88 78 84" fill="none" stroke="#1B3A6B" stroke-width="1"/>
  <!-- Waves -->
  <path d="M14 88 Q25 84 36 88 Q47 92 58 88 Q69 84 82 88" fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
